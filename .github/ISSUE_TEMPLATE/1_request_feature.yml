name: ⭐ Feature request
description: Suggest a feature to improve Katari
labels: [feature request]
body:
  - type: textarea
    id: feature-description
    attributes:
      label: Describe your suggested feature
      description: What should Katari do, and what problem would it solve?
      placeholder: |
        Example:
          "It should work like this..."
    validations:
      required: true

  - type: textarea
    id: other-details
    attributes:
      label: Other details
      description: Add mockups, examples, or other context that may help explain the request.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Please confirm each item before submitting the request.
      options:
        - label: I have searched the existing issues and this is not a duplicate of an open or closed issue.
          required: true
        - label: I have written a short, informative title.
          required: true
        - label: I have checked the [latest Katari release](https://github.com/katariapp/katari/releases/latest) and the feature is not already available.
          required: true
        - label: I have provided all information requested by this form.
          required: true
