name: 🐞 Issue report
description: Report a problem in Katari
labels: [bug]
body:
  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, specific example of the problem.
      placeholder: |
        Example:
          1. Open ...
          2. Select ...
          3. The problem occurs
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: Explain what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: Explain what happened instead.
    validations:
      required: true

  - type: textarea
    id: crash-logs
    attributes:
      label: Crash logs
      description: |
        For crashes, if possible, go to **More → Settings → Advanced**, press **Dump crash logs**, and attach the generated file. Review logs for private information before sharing them.
      placeholder: Attach the crash log file or paste the relevant section here.

  - type: input
    id: katari-version
    attributes:
      label: Katari version
      description: Find this in **More → About**. Include the full version shown there.
      placeholder: 'Example: "1.0.1"'
    validations:
      required: true

  - type: dropdown
    id: build-variant
    attributes:
      label: Build variant
      description: Select the Katari build you installed.
      options:
        - Standard release
        - FOSS release
        - Debug or self-built
        - Unknown
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: 'Example: "Android 15"'
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: Include the manufacturer and model.
      placeholder: 'Example: "Google Pixel 9"'
    validations:
      required: true

  - type: input
    id: entry-type
    attributes:
      label: Affected entry type
      description: State whether this affects manga, anime, or another entry type. Use "Not applicable" when appropriate.
      placeholder: 'Example: "Anime"'
    validations:
      required: true

  - type: textarea
    id: source-extension-details
    attributes:
      label: Source or extension details
      description: If relevant, include the source name and extension package/version. Do not include credentials, tokens, or signed media URLs.

  - type: textarea
    id: other-details
    attributes:
      label: Other details
      description: Add screenshots, recordings, or any other useful context.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Please confirm each item before submitting the report.
      options:
        - label: I have searched the existing issues and this is not a duplicate of an open or closed issue.
          required: true
        - label: I have written a short, informative title.
          required: true
        - label: I have checked the [Katari documentation](https://katariapp.github.io/katari/) and updated to the [latest Katari release](https://github.com/katariapp/katari/releases/latest).
          required: true
        - label: I have provided specific version numbers and all other information requested by this form.
          required: true
        - label: I understand that source-site or extension-content failures may need to be reported to that source or extension's maintainer rather than fixed in Katari.
          required: true
