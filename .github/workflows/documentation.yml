name: Documentation

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'entry-source-api/src/**'
      - 'entry-source-api/build.gradle.kts'
      - 'book-api/src/**'
      - 'book-api/build.gradle.kts'
      - 'gradle/libs.versions.toml'
      - '.nvmrc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/serve-docs.sh'
      - 'scripts/generate-docs-redirects.mjs'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '10.20.0'
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install documentation dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Entry SDK documentation version
        shell: bash
        run: |
          set -euo pipefail
          latest_sdk_tag="$(git for-each-ref --count=1 --sort=-version:refname --format='%(refname:short)' 'refs/tags/sdk-*')"
          if [[ -n "$latest_sdk_tag" ]] && git diff --quiet "$latest_sdk_tag"..HEAD -- entry-source-api/src book-api/src; then
            echo "SDK_DOC_VERSION=$latest_sdk_tag" >> "$GITHUB_ENV"
          else
            echo "SDK_DOC_VERSION=development" >> "$GITHUB_ENV"
          fi

      - name: Build SDK API references
        run: |
          ./gradlew --quiet \
            :entry-source-api:dokkaGeneratePublicationHtml \
            :book-api:dokkaGeneratePublicationHtml \
            -PsourceApiVersion="$SDK_DOC_VERSION"

      - name: Add SDK API references to documentation
        run: |
          mkdir -p docs/public/developers/sdk/api
          cp -R entry-source-api/build/dokka/html/. docs/public/developers/sdk/api/
          mkdir -p docs/public/developers/sdk/api/book
          cp -R book-api/build/dokka/html/. docs/public/developers/sdk/api/book/

      - name: Build documentation
        run: pnpm docs:build

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy documentation
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
