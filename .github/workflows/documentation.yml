name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'entry-source-api/src/**'
      - 'entry-source-api/build.gradle.kts'
      - 'book-api/src/**'
      - 'book-api/build.gradle.kts'
      - 'gradle/libs.versions.toml'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'scripts/serve-docs.sh'
      - '.github/workflows/documentation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'entry-source-api/src/**'
      - 'entry-source-api/build.gradle.kts'
      - 'book-api/src/**'
      - 'book-api/build.gradle.kts'
      - 'gradle/libs.versions.toml'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'scripts/serve-docs.sh'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-docs.txt

      - name: Resolve Entry SDK documentation version
        shell: bash
        run: |
          set -euo pipefail
          latest_sdk_tag="$(git for-each-ref --count=1 --sort=-version:refname --format='%(refname:short)' 'refs/tags/sdk-*')"
          if [[ -n "$latest_sdk_tag" ]] && git diff --quiet "$latest_sdk_tag"..HEAD -- entry-source-api/src book-api/src; then
            echo "SDK_DOC_VERSION=$latest_sdk_tag" >> "$GITHUB_ENV"
          else
            echo "SDK_DOC_VERSION=development" >> "$GITHUB_ENV"
          fi

      - name: Build SDK API references
        run: |
          ./gradlew --quiet \
            :entry-source-api:dokkaGeneratePublicationHtml \
            :book-api:dokkaGeneratePublicationHtml \
            -PsourceApiVersion="$SDK_DOC_VERSION"

      - name: Add SDK API references to documentation
        run: |
          mkdir -p docs/developers/sdk/api
          cp -R entry-source-api/build/dokka/html/. docs/developers/sdk/api/
          mkdir -p docs/developers/sdk/api/book
          cp -R book-api/build/dokka/html/. docs/developers/sdk/api/book/

      - name: Build documentation
        run: mkdocs build --strict

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy documentation
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
