android.nonTransitiveRClass=false

kotlin.code.style=official

# Configuration should be synced with [/gradle/build-logic/gradle.properties]
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -Djava.io.tmpdir=gradle/tmp
org.gradle.parallel=true

# Avoid Kotlin daemon temp-file failures in constrained /tmp environments.
kotlin.compiler.execution.strategy=in-process

# Enabled parallel sync for Gradle 9.4+
org.gradle.tooling.parallel=true
org.gradle.configuration-cache=true
